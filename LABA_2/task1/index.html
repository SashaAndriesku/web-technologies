<!DOCTYPE html>
<html>
    <head>
        <title>LAB_2</title>
    </head>
    <body>
        <h1>Написати функцію, яка приймає масив чисел і повертає максимальний та мінімальний елементи у масиві.</h1>
        
        <h2 id="result"></h2>

        <script>
            function findMinMax(arr) {
                let min = arr[0];
                let max = arr[0];

                for (let i = 1; i < arr.length; i++) {
                    if (arr[i] > max) {
                        max = arr[i];
                    }
                    if (arr[i] < min) {
                        min = arr[i];
                    }
                }
                return { min: min, max: max };
            }

            
            let answer = findMinMax([10, 2, 5, 20, 8]);

            
            document.getElementById("result").innerText = "Мінімальне: " + answer.min + ", Максимальне: " + answer.max;
        </script>
    </body>
</html>
